<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 4 - Tables</title>
</head>
<body>

    <h1>Student Data Table</h1>

    <table border="1">

        <caption>Student Information</caption>

        <!-- Header Row -->
        <tr>
            <th rowspan="2">Name</th>
            <th colspan="2">Details</th>
            <th rowspan="2">Marks</th>
        </tr>

        <tr>
            <th>Age</th>
            <th>Course</th>
        </tr>

        <!-- Data Rows -->
        <tr>
            <td>Ansh</td>
            <td>20</td>
            <td>B.Tech</td>
            <td>90</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>21</td>
            <td>BCA</td>
            <td>85</td>
        </tr>

        <tr>
            <td>Priya</td>
            <td>19</td>
            <td>B.Sc</td>
            <td>88</td>
        </tr>

    </table>

</body>
</html>
