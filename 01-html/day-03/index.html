<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 3 - Advanced HTML Tags</title>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Website</h1>
        <p><mark>Learning HTML Step by Step</mark></p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a>
    </nav>

    <hr>

    <!-- Main Content -->
    <main>

        <section>
            <h2>About</h2>
            <p>This is a <strong>strong</strong> text and <em>emphasized</em> text.</p>
        </section>

        <article>
            <h2>Article</h2>
            <p>This is an article content.</p>
        </article>

        <aside>
            <p>This is sidebar content.</p>
        </aside>

        <section>
            <h2>Extra Tags</h2>

            <p>Today is <time>2026</time></p>

            <p>Water formula: H<sub>2</sub>O</p>

            <p>Power: 10<sup>2</sup> = 100</p>

            <p><small>This is small text</small></p>

        </section>

    </main>

    <br>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
