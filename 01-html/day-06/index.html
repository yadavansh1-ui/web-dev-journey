<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 6 - Practice</title>
</head>
<body>

    <h1>Day 6 Practice</h1>

    <!-- FORM 1: Basic Form -->
    <h2>Basic Form</h2>
    <form>
        <label>Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <button type="submit">Submit</button>
    </form>

    <hr>

    <!-- FORM 2: Advanced Form -->
    <h2>Advanced Form</h2>
    <form>
        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br><br>

        <label>Skills:</label><br>
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JS<br><br>

        <label>Country:</label><br>
        <select>
            <option>India</option>
            <option>USA</option>
        </select><br><br>

        <button type="submit">Submit</button>
    </form>

    <hr>

    <!-- FORM 3: Full Form -->
    <h2>Full Form</h2>
    <form>
        <input type="text" placeholder="Name"><br><br>
        <input type="password" placeholder="Password"><br><br>
        <input type="date"><br><br>
        <input type="file"><br><br>
        <textarea placeholder="Message"></textarea><br><br>
        <button>Send</button>
    </form>

    <hr>

    <!-- TABLE 1: Basic Table -->
    <h2>Basic Table</h2>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Ansh</td>
            <td>20</td>
        </tr>
    </table>

    <hr>

    <!-- TABLE 2: Table with Caption -->
    <h2>Table with Caption</h2>
    <table border="1">
        <caption>Student List</caption>
        <tr>
            <th>Name</th>
            <th>Course</th>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>BCA</td>
        </tr>
    </table>

    <hr>

    <!-- TABLE 3: Table with Colspan & Rowspan -->
    <h2>Advanced Table</h2>
    <table border="1">
        <tr>
            <th rowspan="2">Name</th>
            <th colspan="2">Details</th>
        </tr>
        <tr>
            <th>Age</th>
            <th>Course</th>
        </tr>
        <tr>
            <td>Ansh</td>
            <td>20</td>
            <td>B.Tech</td>
        </tr>
    </table>

</body>
</html>
