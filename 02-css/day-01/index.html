<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Day 1</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: blue;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: red;">Inline CSS Example</h1>

    <!-- Element Selector -->
    <h2>Element Selector Example</h2>

    <!-- Class Selector -->
    <p class="box">This is class selector</p>

    <!-- ID Selector -->
    <h3 id="title">This is ID selector</h3>

    <!-- Group Selector -->
    <p>This is a paragraph</p>
    <h4>This is heading 4</h4>

</body>
</html>
