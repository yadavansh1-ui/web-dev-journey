<!DOCTYPE html>
<html>
<head>
    <title>Float Clear Overflow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Float, Clear, Overflow Demo</h1>

    <div class="container">

        <!-- Moves this box to the left side -->
        <div class="box left">Left Box</div>

        <!-- Moves this box to the right side -->
        <div class="box right">Right Box</div>

    </div>

    <!-- Clears float so next element starts below -->
    <div class="clear"></div>

    <!-- Content will overflow inside this box -->
    <div class="overflow-box">
        This is long content that will overflow the container.
        This is long content that will overflow the container.
        This is long content that will overflow the container.
        This is long content that will overflow the container.
    </div>

</body>
</html>
